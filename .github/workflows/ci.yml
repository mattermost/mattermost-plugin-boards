name: Check-in tests

on:
  push:
    branches:
      - 'main'
      - 'releases-**'
      # TEMPORARY: validate FIPS pipeline against this branch without opening a PR.
      # Remove before merging the FIPS support change.
      - 'pb.like.fips'
  pull_request:
  workflow_dispatch:

env:
 BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
 EXCLUDE_ENTERPRISE: true

permissions:
  contents: read

jobs:
  go:
    name: Compute Go Version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.calculate.outputs.GO_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: "0"
      - name: Calculate Go version
        id: calculate
        run: echo "GO_VERSION=$(grep -E '^go [0-9]+\.[0-9]+' go.mod | cut -d' ' -f2)" >> "${GITHUB_OUTPUT}"

  webapp-test:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        path: "focalboard"
    - name: Setup Node
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version-file: focalboard/.nvmrc
    - name: npm ci
      run: cd focalboard/webapp && npm ci
    - name: Lint & test webapp
      run: cd focalboard; make webapp-ci

  server-test:
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: mmuser
          POSTGRES_PASSWORD: mostest
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      TEST_DATABASE_DRIVERNAME: postgres
      FOCALBOARD_STORE_TEST_DB_TYPE: postgres
      FOCALBOARD_STORE_TEST_DOCKER_PORT: "5432"
    steps:
    - name: Checkout
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        path: "focalboard"
    - name: Set up Go
      uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version-file: focalboard/go.mod
    - name: set up golangci-lint
      run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.8
    - name: Lint & test server
      run: cd focalboard; make server-ci
      
  dist:
    permissions:
      contents: read
      id-token: write
    uses: mattermost/actions-workflows/.github/workflows/plugin-dist-pr.yml@main
    secrets: inherit
    with:
      dist-target: "dist-linux"
      s3-prefix: "mattermost-plugin-boards"

  # Builds a FIPS-compliant variant of the plugin using the FIPS-patched Go
  # toolchain shipped in mattermost-build-server-fips. FIPS_ENABLED=true
  # restricts output to linux-amd64 (the only platform the FIPS toolchain
  # supports) and leaves CGO at the toolchain default.
  #
  # Skipped on forks: they lack DockerHub credentials to pull the private
  # FIPS container image.
  dist-fips:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-22.04
    needs:
      - go
    container:
      image: mattermostdevelopment/mattermost-build-server-fips:${{ needs.go.outputs.version }}
      credentials:
        username: ${{ secrets.DOCKERHUB_DEV_USERNAME }}
        password: ${{ secrets.DOCKERHUB_DEV_TOKEN }}
    env:
      FIPS_ENABLED: true
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: "0"
      - name: Configure git safe.directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Build FIPS dist
        run: make dist-linux
      - name: Upload FIPS build artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: focalboard-bundle-fips-${{ steps.short-sha.outputs.sha }}
          path: dist/*.tar.gz
          retention-days: 7

  # Runs server unit tests under the FIPS-patched Go toolchain. Any test
  # path exercising non-FIPS crypto will panic at runtime, failing CI.
  server-test-fips:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-22.04
    needs:
      - go
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: mmuser
          POSTGRES_PASSWORD: mostest
          POSTGRES_DB: mattermost_test
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    container:
      image: mattermostdevelopment/mattermost-build-server-fips:${{ needs.go.outputs.version }}
      credentials:
        username: ${{ secrets.DOCKERHUB_DEV_USERNAME }}
        password: ${{ secrets.DOCKERHUB_DEV_TOKEN }}
    env:
      IS_CI: "true"
      FIPS_ENABLED: "true"
      TEST_DATABASE_DRIVERNAME: postgres
      FOCALBOARD_STORE_TEST_DB_TYPE: postgres
      FOCALBOARD_STORE_TEST_CONN_STRING: "postgres://mmuser:mostest@postgres:5432/mattermost_test?sslmode=disable&connect_timeout=10"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure git safe.directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE
      - name: Run server tests (FIPS)
        run: make server-test